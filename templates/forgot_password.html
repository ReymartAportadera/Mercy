<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustFile | Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}?v={{ css_version  }}">
</head>
<body>
    <a href="{{ url_for('login') }}" class="home-btn" title="Back to Login">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="cyber-bg-container">
        <div class="dark-overlay"></div>
    </div>

    <div class="login-container">
        <div class="login-box">
            <h2>TRUST<span>FILE</span></h2>
            <p>Reset Your Password</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                <div style="margin-bottom: 15px; text-align: center; font-size: 0.85rem; color: #ff6666;">
                  {% for category, message in messages %}
                    <div>{{ message }}</div>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form method="POST" id="resetForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="email" name="email" placeholder="Enter Account Email" required>
                
                <div class="password-wrapper" style="margin-top: 15px;">
                    <input type="password" name="new_password" id="new_password" placeholder="New Password" required>
                    <i class="fas fa-eye" id="togglePassword1"></i>
                </div>

                <div class="password-wrapper" style="margin-top: 15px;">
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm New Password" required>
                    <i class="fas fa-eye" id="togglePassword2"></i>
                </div>
                
                <button type="submit" id="resetBtn" style="margin-top: 20px;">Reset Password</button>
            </form>

            <div style="margin-top: 20px; text-align: center;">
                <a href="{{ url_for('login') }}" class="signup-link">Remember your password? Log in</a>
            </div>
        </div>
    </div>

    <script>
        function setupToggle(iconId, inputId) {
            const icon = document.querySelector('#' + iconId);
            const input = document.querySelector('#' + inputId);
            icon.addEventListener('click', function () {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye-slash');
                if (type === 'text') {
                    this.style.color = '#ff1e1e';
                } else {
                    this.style.color = '#888';
                }
            });
        }
        setupToggle('togglePassword1', 'new_password');
        setupToggle('togglePassword2', 'confirm_password');

        const resetForm = document.querySelector('#resetForm');
        const resetBtn = document.querySelector('#resetBtn');
        resetForm.addEventListener('submit', function () {
            resetBtn.innerHTML = '<div class="loader"></div>';
            resetBtn.style.pointerEvents = 'none';
            resetBtn.style.opacity = '0.8';
        });
    </script>
</body>
</html>
